<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Tap-Tap - Office Dashboard</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
color:#fff;
font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
min-height:100vh;
}
.container { max-width:1400px; margin:0 auto; padding:30px 20px; }
header {
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 0;
margin-bottom:30px;
border-bottom: 2px solid rgba(255,255,255,0.1);
}
.logo {
font-size:36px;
font-weight:900;
background: linear-gradient(135deg, #06b6d4 0%, #f97316 50%, #a855f7 100%);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
letter-spacing: 2px;
}
.badge {
background: linear-gradient(135deg, #10b981 0%, #059669 100%);
color:#fff;
padding:8px 16px;
border-radius:20px;
font-size:12px;
font-weight:700;
text-transform: uppercase;
letter-spacing: 2px;
}
.stats {
display:grid;
grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
gap:20px;
margin-bottom:30px;
}
.stat {
background: rgba(30, 41, 59, 0.8);
padding:30px;
border-radius:20px;
text-align:center;
border: 1px solid rgba(255,255,255,0.1);
}
.num {
font-size:56px;
font-weight:900;
margin-bottom:10px;
}
.green { color:#10b981; }
.blue { color:#06b6d4; }
.amber { color:#f97316; }
.purple { color:#a855f7; }
.label {
font-size:12px;
color:#94a3b8;
text-transform:uppercase;
letter-spacing:2px;
font-weight:600;
}
.card {
background: rgba(30, 41, 59, 0.8);
padding:30px;
border-radius:20px;
margin-bottom:25px;
border: 1px solid rgba(255,255,255,0.1);
}
h2 {
margin:0 0 25px;
font-size:18px;
color:#f1f5f9;
font-weight:700;
}
.company-grid {
display:grid;
grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
gap:20px;
}
.company-item {
background: rgba(15, 23, 42, 0.6);
padding:25px;
border-radius:15px;
border-left: 5px solid #f97316;
}
.company-name {
font-weight:700;
margin-bottom:10px;
font-size:16px;
color:#f1f5f9;
}
.company-count {
font-size:48px;
font-weight:900;
color:#f97316;
line-height: 1;
}
.controls {
display:flex;
gap:15px;
margin-bottom:25px;
flex-wrap:wrap;
}
input {
flex:1;
padding:14px 18px;
border-radius:12px;
border:2px solid rgba(255,255,255,0.1);
background: rgba(15, 23, 42, 0.6);
color:#fff;
font-size:15px;
min-width:250px;
}
input:focus {
outline: none;
border-color: #06b6d4;
}
button {
padding:14px 24px;
border-radius:12px;
border:none;
font-weight:700;
cursor:pointer;
color:#fff;
text-transform: uppercase;
letter-spacing: 1px;
font-size:14px;
}
.btn-refresh {
background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
}
.btn-export {
background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
}
.btn-clear {
background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
}
button:hover {
transform: translateY(-2px);
}
.table-container {
overflow-x: auto;
}
table {
width:100%;
border-collapse:separate;
border-spacing: 0;
min-width: 1000px;
}
th {
background: rgba(15, 23, 42, 0.8);
padding:16px;
text-align:left;
font-size:11px;
color:#94a3b8;
text-transform:uppercase;
letter-spacing: 1.5px;
font-weight:700;
}
th:first-child {
border-top-left-radius: 10px;
}
th:last-child {
border-top-right-radius: 10px;
}
td {
padding:18px 16px;
border-bottom:1px solid rgba(255,255,255,0.05);
vertical-align: top;
}
tr:hover {
background: rgba(255,255,255,0.05);
}
.method-badge {
padding:6px 14px;
border-radius:20px;
font-size:11px;
font-weight:700;
text-transform: uppercase;
letter-spacing: 1px;
display: inline-block;
}
.face {
background: rgba(6, 182, 212, 0.2);
color:#22d3ee;
border: 1px solid rgba(34, 211, 238, 0.3);
}
.qr {
background: rgba(5, 150, 105, 0.2);
color:#34d399;
border: 1px solid rgba(52, 211, 153, 0.3);
}
.action-badge {
padding:6px 14px;
border-radius:20px;
font-size:12px;
font-weight:700;
text-transform: uppercase;
letter-spacing: 1px;
display: inline-block;
}
.in {
background: rgba(16, 185, 129, 0.2);
color:#34d399;
border: 1px solid rgba(52, 211, 153, 0.3);
}
.out {
background: rgba(249, 115, 22, 0.2);
color:#fbbf24;
border: 1px solid rgba(251, 191, 36, 0.3);
}
.time {
color:#94a3b8;
font-family:'Courier New', monospace;
font-size:14px;
white-space: nowrap;
}
.location-cell {
font-size:12px;
color:#a5b4fc;
max-width: 200px;
overflow: hidden;
text-overflow: ellipsis;
white-space: nowrap;
}
.location-icon {
display:inline-block;
margin-right:5px;
color:#f97316;
}
.map-link {
color:#06b6d4;
text-decoration:none;
font-size:11px;
margin-left:5px;
white-space: nowrap;
}
.map-link:hover {
text-decoration:underline;
}
.empty {
text-align:center;
color:#64748b;
padding:50px;
font-size:16px;
}
.footer {
text-align:center;
font-size:12px;
color:#64748b;
margin-top:40px;
padding:25px 0;
border-top: 1px solid rgba(255,255,255,0.1);
}
.expired {
color: #f87171;
font-weight: 700;
}
.valid {
color: #34d399;
}
</style>
</head>
<body>
<div class="container">
<header>
<div class="logo">ATTENDANCE TAP-TAP</div>
<div class="badge">● Live</div>
</header>

<div class="stats">
<div class="stat"><div class="num green" id="onsite">0</div><div class="label">Currently On Site</div></div>
<div class="stat"><div class="num blue" id="total">0</div><div class="label">Total Sign-Ins Today</div></div>
<div class="stat"><div class="num amber" id="recent">0</div><div class="label">Last 15 Minutes</div></div>
<div class="stat"><div class="num purple" id="unique">0</div><div class="label">Unique Operatives</div></div>
</div>

<div class="card">
<h2>📊 Operatives by Site</h2>
<div class="company-grid" id="companyGrid"><div class="empty">Loading...</div></div>
</div>

<div class="controls">
<input type="text" id="search" placeholder="🔍 Filter by name, site, or method...">
<button class="btn-refresh" onclick="location.reload()">↻ Refresh</button>
<button class="btn-export" onclick="exportCSV()">📥 Export CSV</button>
<button class="btn-clear" onclick="clearToday()">🗑 Clear Today</button>
</div>

<div class="card">
<div class="table-container">
<table>
<thead>
<tr>
<th>Operative</th>
<th>Site</th>
<th>Method</th>
<th>Action</th>
<th>Location</th>
<th>Time</th>
</tr>
</thead>
<tbody id="tbody"><tr><td colspan="6" class="empty">Connecting to database...</td></tr></tbody>
</table>
</div>
</div>

<div class="footer">We Are A Team Together Ltd © 2026</div>
</div>

<script>
// Firebase Configuration
const firebaseConfig = {
apiKey: "AIzaSyAuqUFnN1Mv8cDf5aOF7Scls0Iz3ZxDTKc",
authDomain: "attendance-tap-tap.firebaseapp.com",
projectId: "attendance-tap-tap",
storageBucket: "attendance-tap-tap.firebasestorage.app",
messagingSenderId: "80163999372",
appId: "1:80163999372:web:a1b661435f4a6959e6b5a9"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const signinsRef = db.ref('signins');

let allRecords = [];

function todayStart() {
const d = new Date();
d.setHours(0, 0, 0, 0);
return d.getTime();
}

function escapeHtml(text) {
if (!text) return '';
const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
return String(text).replace(/[&<>"']/g, m => map[m]);
}

function timeAgo(ts) {
if (!ts) return 'unknown';
const s = Math.floor((Date.now() - ts) / 1000);
if (s < 60) return s + 's ago';
if (s < 3600) return Math.floor(s / 60) + 'm ago';
if (s < 86400) return Math.floor(s / 3600) + 'h ago';
return Math.floor(s / 86400) + 'd ago';
}

function render() {
try {
const today = todayStart();
const todays = allRecords.filter(function(r) { return r.timestamp && r.timestamp >= today; });
const onSiteNow = todays.filter(function(r) { return r.action === 'IN' && r.timestamp > Date.now() - 15 * 60 * 1000; }).length;
const totalIns = todays.filter(function(r) { return r.action === 'IN'; }).length;
const recent = todays.filter(function(r) { return Date.now() - r.timestamp < 15 * 60 * 1000; }).length;

const uniqueIds = [];
todays.forEach(function(r) {
if (uniqueIds.indexOf(r.userId) === -1) {
uniqueIds.push(r.userId);
}
});
const unique = uniqueIds.length;

document.getElementById('onsite').textContent = onSiteNow;
document.getElementById('total').textContent = totalIns;
document.getElementById('recent').textContent = recent;
document.getElementById('unique').textContent = unique;

const siteCount = {};
todays.forEach(function(r) {
if (r.siteId) {
siteCount[r.siteId] = (siteCount[r.siteId] || 0) + 1;
}
});

const sites = Object.entries(siteCount).sort(function(a, b) { return b[1] - a[1]; });
const grid = document.getElementById('companyGrid');

if (sites.length === 0) {
grid.innerHTML = '<div class="empty">No operatives on site</div>';
} else {
grid.innerHTML = sites.map(function(item) {
return '<div class="company-item"><div class="company-name">Site ' + item[0] + '</div><div class="company-count">' + item[1] + '</div></div>';
}).join('');
}

const tbody = document.getElementById('tbody');
const filter = document.getElementById('search').value.toLowerCase();

let records = todays.filter(function(r) {
return (r.siteId ? r.siteId.toLowerCase() : '').indexOf(filter) !== -1 ||
(r.method ? r.method.toLowerCase() : '').indexOf(filter) !== -1;
});

records.sort(function(a, b) { return b.timestamp - a.timestamp; });

if (records.length === 0) {
tbody.innerHTML = '<tr><td colspan="6" class="empty">No records today</td></tr>';
} else {
tbody.innerHTML = records.map(function(r) {
const time = new Date(r.timestamp).toLocaleTimeString();

const methodClass = r.method === 'FACE' ? 'face' : 'qr';
const actionClass = r.action === 'IN' ? 'in' : 'out';

return '<tr>' +
'<td><div style="font-weight:700; font-size:15px;">' + (r.userId ? 'User ' + r.userId.substring(0, 8) : 'Unknown') + '</div></td>' +
'<td><div style="font-weight:600; font-size:14px;">Site ' + (r.siteId || 'Unknown') + '</div></td>' +
'<td><span class="method-badge ' + methodClass + '">' + (r.method || 'Unknown') + '</span></td>' +
'<td><span class="action-badge ' + actionClass + '">' + (r.action || 'Unknown') + '</span></td>' +
'<td><span class="location-cell">' + (r.location || 'No location') + '</span></td>' +
'<td class="time">' + time + '<br><span style="font-size:11px; color:#64748b">' + timeAgo(r.timestamp) + '</span></td>' +
'</tr>';
}).join('');
}
} catch (err) {
console.error('Render error:', err);
document.getElementById('tbody').innerHTML = '<tr><td colspan="6" class="empty">Error: ' + err.message + '</td></tr>';
}
}

// Listen for sign-ins
signinsRef.on('value', function(snap) {
allRecords = [];
snap.forEach(function(child) {
const val = child.val();
if (val) {
allRecords.push({ id: child.key });
Object.keys(val).forEach(function(key) {
allRecords[allRecords.length - 1][key] = val[key];
});
}
});
render();
}, function(error) {
console.error('Signins error:', error);
document.getElementById('tbody').innerHTML = '<tr><td colspan="6" class="empty">Database error: ' + error.message + '</td></tr>';
});

document.getElementById('search').addEventListener('input', render);

function exportCSV() {
const today = todayStart();
const data = allRecords.filter(function(r) { return r.timestamp && r.timestamp >= today; });
if (data.length === 0) {
alert('No records to export');
return;
}

let csv = 'Date,Time,User ID,Site,Method,Action,Location\n';
data.sort(function(a, b) { return a.timestamp - b.timestamp; }).forEach(function(r) {
const date = new Date(r.timestamp).toISOString().split('T')[0];
const time = new Date(r.timestamp).toLocaleTimeString();

csv += '"' + date + '","' + time + '","' + (r.userId || '') + '","' + (r.siteId || '') + '","' + (r.method || '') + '","' + (r.action || '') + '","' + (r.location || '') + '"\n';
});

const blob = new Blob([csv], { type: 'text/csv' });
const url = URL.createObjectURL(blob);
const a = document.createElement('a');
a.href = url;
a.download = 'attendance-tap-tap-' + new Date().toISOString().split('T')[0] + '.csv';
a.click();
}

async function clearToday() {
if (!confirm('⚠️ Reset dashboard for demo? This will delete today\'s records.')) return;

const today = todayStart();
const updates = {};

allRecords.forEach(function(r) {
if (r.timestamp && r.timestamp >= today) {
updates['signins/' + r.id] = null;
}
});

try {
await db.ref('signins').update(updates);
alert('✅ Dashboard reset successfully!');
location.reload();
} catch (err) {
alert('Error: ' + err.message);
}
}

render();
</script>
</body>
</html>
