<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Tap-Tap - Register</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/dist/face-api.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
color:#fff;
font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
min-height:100vh;
padding:20px;
}
.container { max-width:500px; margin:0 auto; }
header {
text-align:center;
padding:30px 0;
margin-bottom:20px;
border-bottom: 2px solid rgba(255,255,255,0.1);
}
.logo {
font-size:36px;
font-weight:900;
background: linear-gradient(135deg, #06b6d4 0%, #f97316 50%, #a855f7 100%);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
letter-spacing: 2px;
}
.card {
background: rgba(30, 41, 59, 0.8);
padding:30px;
border-radius:20px;
margin-bottom:25px;
border: 1px solid rgba(255,255,255,0.1);
}
h2 {
margin:0 0 25px;
font-size:20px;
color:#f1f5f9;
font-weight:700;
}
.input-group { margin-bottom:15px; }
label {
display:block;
font-size:12px;
color:#94a3b8;
text-transform:uppercase;
letter-spacing:1px;
margin-bottom:8px;
font-weight:600;
}
input {
width:100%;
padding:14px 16px;
border-radius:12px;
border:2px solid rgba(255,255,255,0.1);
background: rgba(15, 23, 42, 0.6);
color:#fff;
font-size:15px;
transition: all 0.3s ease;
}
input:focus {
outline: none;
border-color: #06b6d4;
box-shadow: 0 0 0 4px rgba(6, 182, 212, 0.1);
}
.btn {
width:100%;
padding:14px 24px;
border-radius:12px;
border:none;
font-weight:700;
cursor:pointer;
color:#fff;
transition: all 0.3s ease;
text-transform: uppercase;
letter-spacing: 1px;
margin-top: 10px;
}
.btn-primary {
background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
box-shadow: 0 4px 15px rgba(6, 182, 212, 0.3);
}
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.status-msg {
padding:16px 20px;
border-radius:12px;
text-align:center;
font-weight:600;
margin-bottom:25px;
animation: slideIn 0.3s ease;
}
@keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
.success { background: rgba(6, 78, 59, 0.6); color:#34d399; border: 1px solid rgba(52, 211, 153, 0.3); }
.error { background: rgba(127, 29, 29, 0.6); color:#f87171; border: 1px solid rgba(248, 113, 113, 0.3); }
.info { background: rgba(30, 58, 138, 0.6); color:#93c5fd; border: 1px solid rgba(147, 197, 253, 0.3); }
#video { width:100%; border-radius:15px; display:none; margin:20px 0; border: 3px solid rgba(6, 182, 212, 0.5); }
#video.active { border-color: #10b981; box-shadow: 0 0 30px rgba(16, 185, 129, 0.5); }
.footer { text-align:center; font-size:12px; color:#64748b; margin-top:40px; padding:25px 0; border-top: 1px solid rgba(255,255,255,0.1); }
.hidden { display: none !important; }
.loading-spinner {
display: inline-block;
width: 20px;
height: 20px;
border: 3px solid rgba(255,255,255,0.3);
border-radius: 50%;
border-top-color: #fff;
animation: spin 1s ease-in-out infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
<header>
<div class="logo">ATTENDANCE TAP-TAP</div>
</header>

<div id="statusMsg" class="status-msg" style="display:none;"></div>

<div id="authForm" class="card">
<h2>Create Your Account</h2>

<div class="input-group">
<label>Full Name *</label>
<input type="text" id="name" placeholder="" required>
</div>

<div class="input-group">
<label>Company / Employer *</label>
<input type="text" id="company" placeholder="" required>
</div>

<div class="input-group">
<label>Role / Job Title</label>
<input type="text" id="role" placeholder="">
</div>

<div class="input-group">
<label>Phone Number</label>
<input type="tel" id="phone" placeholder="">
</div>

<div class="input-group">
<label>Direct Line Manager / Supervisor</label>
<input type="text" id="supervisor" placeholder="">
</div>

<div class="input-group">
<label>Qualifications</label>
<input type="text" id="qualifications" placeholder="">
</div>

<div class="input-group">
<label>Qualification Expiry Date</label>
<input type="date" id="qualExpiry">
</div>

<hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 20px 0;">

<div class="input-group">
<label>Email Address *</label>
<input type="email" id="email" placeholder="" required>
</div>

<div class="input-group">
<label>Password (min 6 characters) *</label>
<input type="password" id="password" placeholder="" required>
</div>

<button class="btn btn-primary" onclick="handleAuth()">Create Account</button>
</div>

<div id="faceEnrollment" class="card hidden">
<h2>Enroll Your Face</h2>
<p style="color:#94a3b8; margin-bottom:20px;">Position your face clearly in the camera</p>

<video id="video" autoplay muted playsinline></video>

<div class="btn-group" style="display:flex; gap:10px;">
<button class="btn btn-primary" id="startCameraBtn" onclick="startCamera()">Start Camera</button>
<button class="btn btn-primary" id="captureFaceBtn" onclick="captureFace()" disabled>Capture Face</button>
</div>

<div id="enrollmentStatus" style="margin-top:20px; text-align:center; color:#94a3b8;"></div>
</div>

<div class="footer">We Are A Team Together Ltd © 2026</div>
</div>

<script>
const firebaseConfig = {
apiKey: "AIzaSyAuqUFnN1Mv8cDf5aOF7Scls0Iz3ZxDTKc",
authDomain: "attendance-tap-tap.firebaseapp.com",
projectId: "attendance-tap-tap",
storageBucket: "attendance-tap-tap.firebasestorage.app",
messagingSenderId: "80163999372",
appId: "1:80163999372:web:a1b661435f4a6959e6b5a9"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

const authForm = document.getElementById('authForm');
const faceEnrollment = document.getElementById('faceEnrollment');
const statusMsg = document.getElementById('statusMsg');
const video = document.getElementById('video');
const captureFaceBtn = document.getElementById('captureFaceBtn');
const enrollmentStatus = document.getElementById('enrollmentStatus');

let videoStream = null;
let modelsLoaded = false;
let modelsLoading = false;

function showStatus(msg, type) {
statusMsg.textContent = msg;
statusMsg.className = 'status-msg ' + type;
statusMsg.style.display = 'block';
setTimeout(() => { statusMsg.style.display = 'none'; }, 5000);
}

async function handleAuth() {
const name = document.getElementById('name').value.trim();
const company = document.getElementById('company').value.trim();
const role = document.getElementById('role').value.trim();
const phone = document.getElementById('phone').value.trim();
const supervisor = document.getElementById('supervisor').value.trim();
const qualifications = document.getElementById('qualifications').value.trim();
const qualExpiry = document.getElementById('qualExpiry').value.trim();
const email = document.getElementById('email').value.trim();
const password = document.getElementById('password').value.trim();

if (!name || !company || !email || !password) {
showStatus('❌ Please fill in Name, Company, Email and Password', 'error');
return;
}

try {
showStatus('Creating account...', 'info');
const userCredential = await auth.createUserWithEmailAndPassword(email, password);
const user = userCredential.user;

await db.ref('users/' + user.uid).set({
name: name,
company: company,
role: role,
phone: phone,
supervisor: supervisor,
qualifications: qualifications,
qualExpiry: qualExpiry,
email: email,
faceEnrolled: false,
createdAt: firebase.database.ServerValue.TIMESTAMP
});

showStatus('✅ Account created! Now enroll your face.', 'success');
await new Promise(resolve => setTimeout(resolve, 1500));

authForm.classList.add('hidden');
faceEnrollment.classList.remove('hidden');
window.scrollTo(0, 0);

} catch (err) {
console.error('Auth error:', err);
showStatus('❌ Error: ' + err.message, 'error');
}
}

async function startCamera() {
try {
showStatus('Starting camera...', 'info');
enrollmentStatus.textContent = 'Starting camera...';

videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } } });
video.srcObject = videoStream;
video.style.display = 'block';
video.classList.add('active');

captureFaceBtn.disabled = false;
showStatus('✅ Camera ready! Position your face', 'success');
enrollmentStatus.textContent = 'Camera ready. Click "Capture Face".';
} catch (err) {
showStatus('❌ Camera error: ' + err.message, 'error');
}
}

async function loadModels() {
if (modelsLoaded || modelsLoading) return;

modelsLoading = true;
enrollmentStatus.textContent = 'Loading AI models (this may take 10-15 seconds)...';

try {
const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/model';

await Promise.all([
faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
]);

modelsLoaded = true;
enrollmentStatus.textContent = '✅ AI models loaded! Click "Capture Face"';
} catch (err) {
console.error('Model loading error:', err);
enrollmentStatus.textContent = '❌ Error loading models. Try again.';
} finally {
modelsLoading = false;
}
}

async function captureFace() {
const user = auth.currentUser;
if (!user) {
showStatus('❌ Not logged in!', 'error');
return;
}

try {
enrollmentStatus.textContent = 'Detecting face...';
captureFaceBtn.disabled = true;

// Load models if needed
if (!modelsLoaded) {
await loadModels();
if (!modelsLoaded) {
captureFaceBtn.disabled = false;
return;
}
}

// Wait for video to be ready
if (!video.readyState >= 2) {
await new Promise(resolve => {
video.onloadeddata = resolve;
setTimeout(resolve, 2000);
});
}

// Detect face with timeout
const detection = await Promise.race([
faceapi.detectSingleFace(
video,
new faceapi.TinyFaceDetectorOptions({ inputSize: 640, scoreThreshold: 0.3 })
).withFaceLandmarks().withFaceDescriptor(),
new Promise((_, reject) => setTimeout(() => reject(new Error('Detection timeout')), 10000))
]);

if (!detection) {
showStatus('❌ No face detected! Try better lighting', 'error');
enrollmentStatus.textContent = 'No face detected. Try again with better lighting.';
captureFaceBtn.disabled = false;
return;
}

// Save to database with timeout
enrollmentStatus.textContent = 'Saving face data...';
await Promise.race([
db.ref('users/' + user.uid).update({
faceDescriptor: Array.from(detection.descriptor),
faceEnrolled: true,
lastUpdated: firebase.database.ServerValue.TIMESTAMP
}),
new Promise((_, reject) => setTimeout(() => reject(new Error('Save timeout')), 10000))
]);

showStatus('✅ Face enrolled successfully!', 'success');
enrollmentStatus.textContent = 'Success! Redirecting...';

setTimeout(() => {
window.location.href = 'scan.html';
}, 2000);

} catch (err) {
console.error('Face capture error:', err);
showStatus('❌ Error: ' + err.message, 'error');
enrollmentStatus.textContent = 'Error: ' + err.message + '. Try again.';
captureFaceBtn.disabled = false;
}
}

auth.onAuthStateChanged(async (user) => {
if (user) {
const snap = await db.ref('users/' + user.uid).once('value');
if (snap.exists() && snap.val().faceEnrolled) {
window.location.href = 'scan.html';
} else if (snap.exists()) {
authForm.classList.add('hidden');
faceEnrollment.classList.remove('hidden');
}
}
});
</script>
</body>
</html>
